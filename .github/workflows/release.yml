name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: wordle-tui
            asset_name: wordle-tui-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: wordle-tui.exe
            asset_name: wordle-tui-windows-x86_64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: wordle-tui
            asset_name: wordle-tui-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: wordle-tui
            asset_name: wordle-tui-macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        run: cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.asset_name }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
